services:
  backend:
    build:
      context: .
      dockerfile: ./src/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./src/backend:/app/src/backend
      # NOTE: This bind mount is intended for single-instance/local development only.
      # If the backend service is scaled to multiple containers, they will all share
      # the same JSON data files under ./data without coordination, which can corrupt data.
      # For production or horizontal scaling, replace this with a proper shared datastore
      # (e.g., a database) or implement robust file locking in the backend before reusing it.
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_URL=http://ollama:11434
    env_file:
      - .env
    depends_on:
      - ollama
    command: >
      sh -c "(bash src/backend/scripts/init_ollama.sh || true; \
              python3 src/backend/scripts/warm_up_ollama.py || true) & \
             exec uvicorn src.backend.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
  
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend
    env_file:
      - .env
    restart: unless-stopped

volumes:
  ollama_data: